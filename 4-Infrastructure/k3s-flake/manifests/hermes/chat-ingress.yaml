# Ingress for chat.researchstack.info subdomain
# Routes chat.researchstack.info to Hermes service with Authentik forward auth
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: chat-researchstack-info
  namespace: services
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    traefik.ingress.kubernetes.io/router.middlewares: services-authentik-forward-auth@kubernetescrd
spec:
  rules:
    - host: chat.researchstack.info
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hermes
                port:
                  number: 80
