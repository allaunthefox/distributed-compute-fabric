apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes
  namespace: services
  labels:
    app: hermes
    component: orchestrator
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: hermes
  template:
    metadata:
      labels:
        app: hermes
        component: orchestrator
    spec:
      nodeSelector:
        kubernetes.io/hostname: cupfox
      tolerations:
        - key: "node-role.kubernetes.io/control-plane"
          operator: "Exists"
          effect: "NoSchedule"
        - key: "node.kubernetes.io/disk-pressure"
          operator: "Exists"
          effect: "NoSchedule"

      containers:
        - name: hermes
          image: 10.43.36.163:5000/hermes-orchestrator:latest
          imagePullPolicy: Always
          command: ["uvicorn", "orchestrator:app", "--host", "0.0.0.0", "--port", "8000"]
          env:
            - name: RAY_ADDRESS
              value: "ray://raycluster-head-svc.ray-system.svc.cluster.local:6379"
            - name: HERMES_MODEL_PATH
              value: "/models/gemma-4-e4b.gguf"
            - name: ORCHESTRATOR_ENABLED
              value: "true"
            - name: CODER_MODEL_URL
              value: "http://coder-model.services.svc.cluster.local"
            - name: ARM_MODEL_URL
              value: "http://coder-model.services.svc.cluster.local"
            - name: GPU_MODEL_URL
              value: ""
            - name: MAIN_MODEL_URL
              value: "http://coder-model.services.svc.cluster.local"
            - name: QWEN2_MODEL_URL
              value: "http://qwen2-model.services.svc.cluster.local"
            - name: LLAVA_MODEL_URL
              value: "http://llava-model.services.svc.cluster.local"
            - name: MATH_MODEL_URL
              value: "http://coder-model.services.svc.cluster.local"
            - name: GARAGE_S3_ENDPOINT
              value: "http://garage-s3.ray-system.svc.cluster.local:3900"
            - name: GARAGE_ENDPOINTS
              value: "http://garage-s3.ray-system.svc.cluster.local:3900"
            - name: HERMES_PORT
              value: "8000"
            - name: HERMES_CONTEXT_WINDOW
              value: "8192"
            - name: HERMES_MAX_TOKENS
              value: "4096"
          ports:
            - containerPort: 8000
              name: http

          resources:
            requests:
              memory: "2Gi"
              cpu: "1"
            limits:
              memory: "4Gi"
              cpu: "2"
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 20
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

